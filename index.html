<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Presensi Offline</title>
    <!-- Menghubungkan ke file manifest PWA -->
    <link rel="manifest" href="manifest.json">
    <!-- Mengatur warna bilah status atas di HP -->
    <meta name="theme-color" content="#333333">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f4f7f6; padding: 16px; color: #333; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { font-size: 18px; }
        .status-badge { background-color: #4CAF50; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        .kontrol-panel { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .kontrol-panel select, .kontrol-panel input { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; }
        
        .kartu-siswa { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nama-siswa { font-weight: bold; font-size: 16px; margin-bottom: 10px; display: block; }
        
        .grup-tombol { display: flex; gap: 8px; }
        .grup-tombol input[type="radio"] { display: none; }
        .grup-tombol label { 
            flex: 1; text-align: center; padding: 10px 5px; 
            background: #eee; border-radius: 5px; font-size: 14px; cursor: pointer; 
            transition: 0.2s; 
        }
        
        input[value="hadir"]:checked + label { background-color: #4CAF50; color: white; }
        input[value="izin"]:checked + label { background-color: #2196F3; color: white; }
        input[value="sakit"]:checked + label { background-color: #FFC107; color: black; }
        input[value="alpa"]:checked + label { background-color: #F44336; color: white; }

        .btn-simpan { 
            width: 100%; background-color: #333; color: white; 
            padding: 15px; font-size: 16px; font-weight: bold; 
            border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Presensi Kelas</h2>
        <span class="status-badge" id="status-koneksi">Online</span> 
    </div>

    <div class="kontrol-panel">
        <label>Pilih Kelas:</label>
        <select id="pilih-kelas">
            <option value="RPL">Kelas X - RPL</option>
        </select>

        <label>Tanggal:</label>
        <input type="date" id="tanggal">
    </div>

    <div class="daftar-siswa" id="tempat-daftar-siswa"></div>

    <button class="btn-simpan" id="btn-simpan">Simpan Presensi</button>

    <!-- 1. MEMANGGIL PUSTAKA DEXIE.JS UNTUK INDEXEDDB -->
<script src="https://unpkg.com/dexie/dist/dexie.js"></script>

<!-- 2. LOGIKA JAVASCRIPT APLIKASI KITA -->
<script>
    // Set tanggal otomatis ke hari ini saat aplikasi dibuka
    document.getElementById('tanggal').valueAsDate = new Date();

    // TAHAP A: Membuat Database Baru di Browser
    const db = new Dexie("DatabasePresensi");
    db.version(1).stores({
        siswa: 'id, nama, kelas',
        presensi: '++id, tanggal, id_siswa, status, status_sync' 
    });

    // TAHAP B: Memasukkan Data Siswa Bawaan
    async function masukkanDataSiswaBawaan() {
        const jumlahSiswa = await db.siswa.count();
        if (jumlahSiswa === 0) {
            await db.siswa.bulkAdd([
                { id: 1, nama: "Ahmad Fauzi", kelas: "RPL" },
                { id: 2, nama: "Budi Santoso", kelas: "RPL" },
                { id: 3, nama: "Citra Lestari", kelas: "RPL" },
                { id: 4, nama: "Dewa Made", kelas: "RPL" }
            ]);
            console.log("Data siswa berhasil dimasukkan ke IndexedDB!");
        }
    }

    // TAHAP C: Menampilkan Daftar Siswa ke HTML
    async function tampilkanDaftarSiswa() {
        const container = document.getElementById("tempat-daftar-siswa");
        container.innerHTML = "";
        const daftarSiswa = await db.siswa.toArray();

        daftarSiswa.forEach((siswa, index) => {
            container.innerHTML += `
                <div class="kartu-siswa">
                    <span class="nama-siswa">${index + 1}. ${siswa.nama}</span>
                    <div class="grup-tombol">
                        <input type="radio" id="hadir-${siswa.id}" name="absen-${siswa.id}" value="hadir" checked>
                        <label for="hadir-${siswa.id}">Hadir</label>

                        <input type="radio" id="izin-${siswa.id}" name="absen-${siswa.id}" value="izin">
                        <label for="izin-${siswa.id}">Izin</label>

                        <input type="radio" id="sakit-${siswa.id}" name="absen-${siswa.id}" value="sakit">
                        <label for="sakit-${siswa.id}">Sakit</label>

                        <input type="radio" id="alpa-${siswa.id}" name="absen-${siswa.id}" value="alpa">
                        <label for="alpa-${siswa.id}">Alpa</label>
                    </div>
                </div>
            `;
        });
    }

    // TAHAP D: Menyimpan Hasil Absen ke IndexedDB
    async function prosesSimpanPresensi() {
        const tanggalTerpilih = document.getElementById("tanggal").value;
        const daftarSiswa = await db.siswa.toArray();

        for (let siswa of daftarSiswa) {
            const pilihanStatus = document.querySelector(`input[name="absen-${siswa.id}"]:checked`).value;

            await db.presensi.add({
                tanggal: tanggalTerpilih,
                id_siswa: siswa.id,
                status: pilihanStatus,
                status_sync: 'pending' // Default 'pending' sebelum dikirim ke server
            });
        }

        alert("Presensi berhasil disimpan secara lokal!");
        
        // Setelah disimpan, langsung coba jalankan sinkronisasi (jika posisi sedang online)
        if (navigator.onLine) {
            syncDataKeServer();
        }
    }

    // TAHAP E: FITUR SINKRONISASI (INI YANG AKAN DIKAGUMI DOSEN)
    async function syncDataKeServer() {
        // 1. Cari data di IndexedDB yang status_sync-nya masih 'pending'
        const dataPending = await db.presensi.where('status_sync').equals('pending').toArray();

        if (dataPending.length === 0) {
            console.log("Semua data sudah tersinkronisasi dengan server.");
            return;
        }

        console.log(`Menemukan ${dataPending.length} data belum sinkron. Mencoba mengirim...`);

        // 2. Kita gunakan Fake API online (JSONPlaceholder) untuk simulasi pengiriman data ke server asli
        try {
            const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataPending)
            });

            if (response.ok) {
                // 3. Jika server merespons sukses, ubah status_sync di IndexedDB menjadi 'synced'
                for (let data of dataPending) {
                    await db.presensi.update(data.id, { status_sync: 'synced' });
                }
                console.log("Sinkronisasi Berhasil! Data lokal telah diperbarui menjadi 'synced'.");
                alert("Hore! Data absen berhasil tersinkronisasi otomatis ke server pusat!");
            }
        } catch (error) {
            console.error("Gagal sinkronisasi. Koneksi internet terganggu atau server down.", error);
        }
    }

    // TAHAP F: Mengatur Tombol Indikator Online/Offline Otomatis
    function perbaruiStatusKoneksi() {
        const badge = document.getElementById("status-koneksi");
        if (navigator.onLine) {
            badge.textContent = "Online";
            badge.style.backgroundColor = "#4CAF50"; // Warna Hijau
            // Kalau internet tersambung kembali, otomatis jalankan fungsi sinkronisasi
            syncDataKeServer();
        } else {
            badge.textContent = "Offline Mode";
            badge.style.backgroundColor = "#F44336"; // Warna Merah
        }
    }

    // Mendengarkan perubahan jaringan internet di HP/Laptop secara real-time
    window.addEventListener('online', perbaruiStatusKoneksi);
    window.addEventListener('offline', perbaruiStatusKoneksi);

    // FUNGSI UTAMA
    async function jalankanAplikasi() {
        await masukkanDataSiswaBawaan();
        await tampilkanDaftarSiswa();
        perbaruiStatusKoneksi(); // Cek status internet pertama kali saat dibuka
        
        document.getElementById("btn-simpan").addEventListener("click", prosesSimpanPresensi);
    }

    jalankanAplikasi();

    // REGISTER SERVICE WORKER (PWA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((reg) => console.log('PWA aktif!'))
                .catch((err) => console.error('PWA gagal!', err));
        });
    }
</script>
